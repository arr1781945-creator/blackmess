server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://black-message-production.up.railway.app wss://black-message-production.up.railway.app https://api.anthropic.com https://github.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Access-Control-Allow-Origin "https://black-message.vercel.app" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
