components:
  schemas:
    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        original_filename:
          type: string
          maxLength: 255
        content_type:
          type: string
          maxLength: 128
        size_bytes:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        storage_backend:
          $ref: '#/components/schemas/StorageBackendEnum'
        ipfs_cid:
          type: string
          maxLength: 128
        checksum_sha256:
          type: string
          maxLength: 64
        uploaded_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - checksum_sha256
      - content_type
      - id
      - original_filename
      - size_bytes
      - uploaded_at
    AttachmentRequest:
      type: object
      properties:
        original_filename:
          type: string
          minLength: 1
          maxLength: 255
        content_type:
          type: string
          minLength: 1
          maxLength: 128
        size_bytes:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        storage_backend:
          $ref: '#/components/schemas/StorageBackendEnum'
        ipfs_cid:
          type: string
          maxLength: 128
        checksum_sha256:
          type: string
          minLength: 1
          maxLength: 64
      required:
      - checksum_sha256
      - content_type
      - original_filename
      - size_bytes
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        event_type:
          type: string
          maxLength: 64
        severity:
          $ref: '#/components/schemas/SeverityEnum'
        actor_username:
          type: string
          readOnly: true
          default: system
        actor_ip:
          type: string
          nullable: true
        target_type:
          type: string
          maxLength: 32
        target_id:
          type: string
          maxLength: 64
        description:
          type: string
        metadata: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - actor_username
      - created_at
      - description
      - event_type
      - id
    BankUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        employee_id:
          type: string
          readOnly: true
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        department:
          type: string
          maxLength: 128
        clearance_level:
          allOf:
          - $ref: '#/components/schemas/ClearanceLevelEnum'
          readOnly: true
          description: |-
            1=Basic, 5=Executive. Controls vault access.

            * `1` - Level 1
            * `2` - Level 2
            * `3` - Level 3
            * `4` - Level 4
            * `5` - Level 5
        is_mfa_verified:
          type: boolean
        avatar_ipfs_cid:
          type: string
          maxLength: 128
        last_active:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        is_locked:
          type: boolean
          readOnly: true
          description: Admin/Axes hard lock
        profile:
          allOf:
          - $ref: '#/components/schemas/UserProfile'
          readOnly: true
        roles:
          type: string
          readOnly: true
      required:
      - clearance_level
      - employee_id
      - id
      - is_locked
      - last_active
      - profile
      - roles
      - username
    BankUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        department:
          type: string
          maxLength: 128
        is_mfa_verified:
          type: boolean
        avatar_ipfs_cid:
          type: string
          maxLength: 128
      required:
      - username
    BlobTypeEnum:
      enum:
      - document
      - certificate
      - evidence
      - secure_note
      - key_backup
      type: string
      description: |-
        * `document` - Document
        * `certificate` - Certificate
        * `evidence` - Audit Evidence
        * `secure_note` - Secure Note
        * `key_backup` - Key Backup
    Channel:
      type: object
