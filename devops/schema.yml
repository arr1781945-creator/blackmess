        id:
          type: string
          format: uuid
          readOnly: true
        channel:
          type: string
          format: uuid
        sender:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        sender_username:
          type: string
          readOnly: true
        sender_avatar:
          type: string
          readOnly: true
        ciphertext_b64:
          type: string
          description: AES-256-GCM encrypted message body
        nonce_b64:
          type: string
          description: 12-byte GCM nonce, base64
          maxLength: 32
        auth_tag_b64:
          type: string
          description: 16-byte GCM auth tag, base64
          maxLength: 32
        kyber_ciphertext_b64:
          type: string
          description: Kyber-1024 encapsulated symmetric key
        dilithium_signature_b64:
          type: string
          description: Dilithium3 message signature
        message_type:
          $ref: '#/components/schemas/MessageTypeEnum'
        is_edited:
          type: boolean
          readOnly: true
        is_deleted:
          type: boolean
          readOnly: true
        ttl_seconds:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Seconds until hard-delete. Null = use channel/workspace policy.
        destroy_at:
          type: string
          format: date-time
          nullable: true
        thread:
          type: string
          format: uuid
          nullable: true
        reply_count:
          type: string
          readOnly: true
